  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            zh: ['"Noto Sans SC"', 'Inter', 'ui-sans-serif'],
            ar: ['Tajawal', 'ui-sans-serif'],
          },
          colors: {
            aic: {
              black: '#000000',
              dark: '#050505',
              card: '#0F0F10',
              gold: '#D4AF37',
              goldLight: '#F3E5AB',
              accent: '#3b82f6',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.8s ease-out forwards',
            'slide-up': 'slideUp 0.8s ease-out forwards',
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 2.5s infinite',
            'text-shine': 'textShine 5s linear infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scroll-up': 'scrollUp 40s linear infinite',
            'scroll-down': 'scrollDown 40s linear infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(30px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
            textShine: {
              '0%': { backgroundPosition: '0% 50%' },
              '100%': { backgroundPosition: '200% 50%' },
            },
            scrollUp: {
              '0%': { transform: 'translateY(0)' },
              '100%': { transform: 'translateY(-50%)' },
            },
            scrollDown: {
              '0%': { transform: 'translateY(-50%)' },
              '100%': { transform: 'translateY(0)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      /* Default to dark mode colors if JS hasn't loaded, handled by tailwind classes mainly */
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #777;
    }

    /* Glass Card - Light Mode Default */
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }

    /* Glass Card - Dark Mode */
    .dark .glass-card {
      background: rgba(20, 20, 22, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .text-gradient-gold {
      background: linear-gradient(135deg, #111 0%, #D4AF37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dark .text-gradient-gold {
      background: linear-gradient(135deg, #FFF 0%, #D4AF37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .text-gradient-gold-shine {
      background: linear-gradient(to right, #B8860B 0%, #D4AF37 50%, #B8860B 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textShine 5s linear infinite;
    }

    .dark .text-gradient-gold-shine {
      background: linear-gradient(to right, #D4AF37 0%, #FFF8DC 50%, #D4AF37 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bg-grid-white {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
    }

    .dark .bg-grid-white {
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    }
  </style>
